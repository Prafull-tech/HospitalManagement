<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMS - Hospital Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // If root is still empty after 2s, React didn't mount (check Console for errors)
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          root.innerHTML = '<div style="padding:2rem;font-family:sans-serif">' +
            '<p><strong>Application did not load.</strong></p>' +
            '<p>Open DevTools (F12) &rarr; Console and look for errors.</p>' +
            '<p>Ensure the dev server is running and the backend is up (e.g. <code>http://localhost:8080</code>).</p></div>';
        }
      }, 2000);
    </script>
  </body>
</html>
