spring:
  application:
    name: hospital-management-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:./application-local.yml,optional:file:./backend/application-local.yml
  flyway:
    enabled: false
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hms}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USER:root}
    password: "${MYSQL_PASSWORD:Maknish@2217}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

# Online Payment (Razorpay / Stripe)
payment:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
  stripe:
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    secret-key: ${STRIPE_SECRET_KEY:}

# 3rd Party Drug Lookup API (barcode/GTIN)
thirdparty:
  api:
    url: ${THIRDPARTY_API_URL:}
    key: ${THIRDPARTY_API_KEY:}

# Lab Report PDF
lab:
  report:
    hospital-name: ${HOSPITAL_NAME:Sample Hospital}
    hospital-address: ${HOSPITAL_ADDRESS:123 Hospital Road, City}
    hospital-phone: ${HOSPITAL_PHONE:}
    pathologist-name: ${LAB_PATHOLOGIST_NAME:Pathologist}

# Pharmacy Invoice PDF
pharmacy:
  invoice:
    storage-path: ${INVOICE_STORAGE_PATH:./data/invoices}
    python-path: ${PYTHON_PATH:python}
    script-path: ${INVOICE_SCRIPT_PATH:../invoice-generator/invoice_service.py}
    gst-enabled: false
    gst-percent: 0
  hospital:
    name: ${HOSPITAL_NAME:Sample Hospital}
    address: ${HOSPITAL_ADDRESS:123 Hospital Road, City}
    phone: ${HOSPITAL_PHONE:+91-1234567890}
    gst-no: ${HOSPITAL_GST:}

# JWT
hms:
  security:
    jwt:
      secret: ${JWT_SECRET:${HMS_JWT_SECRET:dev-jwt-secret-change-me}}
      expiry-minutes: ${JWT_EXPIRY_MINUTES:30}
      refresh-expiry-minutes: ${JWT_REFRESH_EXPIRY_MINUTES:30}
    cors:
      # Exact origins (used when allowed-origin-patterns is empty).
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
      # Quote default: bare * in YAML is invalid. Patterns = any port on these hosts (dev).
      allowed-origin-patterns: "${CORS_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*}"
    rate-limit:
      login-attempts-per-minute: ${RATE_LIMIT_LOGIN:10}
  billing:
    opd-consultation-fee: ${HMS_OPD_CONSULTATION_FEE:500}

server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-http-form-post-size: 2MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

---
# MySQL - dev
spring:
  config:
    activate:
      on-profile: dev
  devtools:
    restart:
      enabled: true
      exclude: static/**,public/**,templates/**
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hms}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: "${MYSQL_PASSWORD:Maknish@2217}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update

hms:
  security:
    jwt:
      expiry-minutes: 30

---
# MySQL - prod
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hms}?useUnicode=true&characterEncoding=utf8&useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

hms:
  security:
    jwt:
      secret: ${JWT_SECRET:${HMS_JWT_SECRET}}
