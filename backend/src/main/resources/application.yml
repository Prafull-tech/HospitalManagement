spring:
  application:
    name: hospital-management-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:./application-local.yml,optional:file:./backend/application-local.yml

# Online Payment (Razorpay / Stripe)
payment:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
  stripe:
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    secret-key: ${STRIPE_SECRET_KEY:}

# 3rd Party Drug Lookup API (barcode/GTIN)
# Placeholder - set THIRDPARTY_API_URL to enable. Example: https://api.druglookup.example.com/gtin
# Response should map to: medicineName, strength, form, manufacturer, category
thirdparty:
  api:
    url: ${THIRDPARTY_API_URL:}
    key: ${THIRDPARTY_API_KEY:}

# Lab Report PDF
lab:
  report:
    hospital-name: ${HOSPITAL_NAME:Sample Hospital}
    hospital-address: ${HOSPITAL_ADDRESS:123 Hospital Road, City}
    hospital-phone: ${HOSPITAL_PHONE:}
    pathologist-name: ${LAB_PATHOLOGIST_NAME:Pathologist}

# Pharmacy Invoice PDF
pharmacy:
  invoice:
    storage-path: ${INVOICE_STORAGE_PATH:./data/invoices}
    python-path: ${PYTHON_PATH:python}
    script-path: ${INVOICE_SCRIPT_PATH:../invoice-generator/invoice_service.py}
    gst-enabled: false
    gst-percent: 0
  hospital:
    name: ${HOSPITAL_NAME:Sample Hospital}
    address: ${HOSPITAL_ADDRESS:123 Hospital Road, City}
    phone: ${HOSPITAL_PHONE:+91-1234567890}
    gst-no: ${HOSPITAL_GST:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /api

---
# MySQL - dev (default: root user for local dev; override via MYSQL_USER, MYSQL_PASSWORD)
spring:
  config:
    activate:
      on-profile: dev
  devtools:
    restart:
      enabled: true
      exclude: static/**,public/**,templates/**
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hms}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: "${MYSQL_PASSWORD:root}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update

---
# MySQL - prod (override MYSQL_USER, MYSQL_PASSWORD in production)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hms}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: "${MYSQL_PASSWORD:root}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
